<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOT Gallery — Screen Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --neon: #00ff88;
  --neon2: #ffe000;
  --neon3: #ff44cc;
  --dark: #080c08;
  --metal: #1a1f1a;
  --panel-bg: rgba(4,8,4,0.93);
  --border: rgba(0,255,136,0.2);
  --font-hud: 'Orbitron', monospace;
  --font-mono: 'Share Tech Mono', monospace;
}

body {
  background: var(--dark);
  color: var(--neon);
  font-family: var(--font-mono);
  overflow: hidden;
  width: 100vw; height: 100vh;
  cursor: crosshair;
}

/* ── CANVAS ── */
#wrap { position:absolute; inset:0; }
canvas { width:100%; height:100%; display:block; image-rendering: auto; }

/* ── TOP BAR ── */
#topbar {
  position:absolute; top:0; left:0; right:0; height:48px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  display:flex; align-items:center; gap:10px; padding:0 14px;
  z-index:80;
}
.logo {
  font-family: var(--font-hud);
  font-size: 14px; font-weight:900;
  color: var(--neon);
  text-shadow: 0 0 12px var(--neon), 0 0 25px var(--neon);
  letter-spacing:3px;
  flex-shrink:0;
}
.logo span { color: var(--neon2); text-shadow: 0 0 10px var(--neon2); }
.vsep { width:1px; height:28px; background:var(--border); margin:0 4px; }
.spacer { flex:1; }

.btn {
  font-family: var(--font-hud); font-size:9px; font-weight:700;
  padding:6px 14px; border-radius:2px; cursor:pointer;
  border:1px solid var(--border); background:rgba(0,255,136,0.06);
  color:var(--neon); letter-spacing:1px;
  transition:all .15s; white-space:nowrap;
}
.btn:hover { background:rgba(0,255,136,0.18); box-shadow:0 0 10px rgba(0,255,136,0.4); border-color:var(--neon); }
.btn.active { background:rgba(0,255,136,0.22); border-color:var(--neon); box-shadow:0 0 14px rgba(0,255,136,0.5); }
.btn.warn { border-color:rgba(255,60,60,0.3); color:#ff4444; background:rgba(255,30,30,0.05); }
.btn.warn:hover { background:rgba(255,30,30,0.15); box-shadow:0 0 10px rgba(255,0,0,0.3); }

#color-pick { width:32px; height:32px; border:1px solid var(--border); border-radius:2px; cursor:pointer; padding:2px; background:transparent; }

/* ── RIGHT PANEL ── */
#rpanel {
  position:absolute; top:48px; right:0; bottom:150px; width:230px;
  background:var(--panel-bg); border-left:1px solid var(--border);
  backdrop-filter:blur(10px); z-index:60;
  display:flex; flex-direction:column;
  transition:transform .3s ease;
}
#rpanel.hide { transform:translateX(230px); }

.ptitle {
  font-family:var(--font-hud); font-size:8px; font-weight:700;
  color:var(--neon); letter-spacing:2px;
  padding:10px 12px 8px; border-bottom:1px solid var(--border);
  text-shadow:0 0 8px var(--neon);
}
#slist { flex:1; overflow-y:auto; padding:5px; }
#slist::-webkit-scrollbar { width:3px; }
#slist::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.sitem {
  padding:8px 10px; margin-bottom:3px;
  border:1px solid rgba(0,255,136,0.1); border-radius:2px;
  cursor:pointer; transition:all .12s;
}
.sitem:hover { background:rgba(0,255,136,0.07); border-color:rgba(0,255,136,0.25); }
.sitem.sel { background:rgba(0,255,136,0.13); border-color:var(--neon); box-shadow:0 0 8px rgba(0,255,136,0.2); }
.sname { font-family:var(--font-hud); font-size:9px; color:var(--neon); }
.sinfo { font-size:9px; color:#3a5a3a; margin-top:2px; }

#detpanel { border-top:1px solid var(--border); padding:10px 12px; }
#detpanel label { font-size:8px; color:#4a6a4a; display:block; margin-bottom:2px; font-family:var(--font-hud); letter-spacing:1px; }
#detpanel input[type=text] {
  width:100%; background:rgba(0,0,0,0.5); border:1px solid var(--border);
  color:var(--neon); font-family:var(--font-mono); font-size:10px;
  padding:5px 8px; border-radius:2px; margin-bottom:7px; outline:none;
}
#detpanel input[type=text]:focus { border-color:var(--neon); box-shadow:0 0 6px rgba(0,255,136,0.3); }
#detpanel input[type=range] { width:100%; margin-bottom:6px; accent-color:var(--neon); }

/* ── CAM INDICATOR ── */
#camind {
  position:absolute; top:58px; left:12px;
  background:rgba(4,8,4,0.85); border:1px solid var(--border);
  font-size:9px; font-family:var(--font-hud); color:#3a5a3a;
  padding:5px 10px; border-radius:2px; z-index:50; letter-spacing:1px;
}
#camind b { color:var(--neon); }

/* ── TERMINAL ── */
#terminal {
  position:absolute; bottom:0; left:0; right:0; height:150px;
  background:rgba(2,5,2,0.96);
  border-top:1px solid var(--border);
  backdrop-filter:blur(14px); z-index:80;
  display:flex; flex-direction:column;
  font-family:var(--font-mono); font-size:11px;
}
#tlog { flex:1; overflow-y:auto; padding:5px 14px; display:flex; flex-direction:column; gap:1px; }
#tlog::-webkit-scrollbar { width:3px; }
#tlog::-webkit-scrollbar-thumb { background:rgba(0,255,136,0.2); }
.tl { line-height:1.6; white-space:pre; }
.tl.s { color:#234a23; } .tl.i { color:#00ccff; } .tl.k { color:#00ff88; }
.tl.e { color:#ff4455; } .tl.h { color:#ffe000; } .tl.o { color:#8aab8a; }

#tinrow {
  display:flex; align-items:center; gap:8px;
  border-top:1px solid rgba(0,255,136,0.1); padding:5px 14px;
}
#tprompt { color:var(--neon); font-size:13px; }
#tin {
  flex:1; background:transparent; border:none; outline:none;
  color:#00ccff; font-family:var(--font-mono); font-size:11px;
}
#texec {
  background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.25);
  color:var(--neon); font-family:var(--font-hud); font-size:8px;
  padding:4px 12px; cursor:pointer; border-radius:2px; letter-spacing:1px;
}
#texec:hover { background:rgba(0,255,136,0.2); }

/* ── TOAST ── */
#toast {
  position:fixed; top:60px; left:50%; transform:translateX(-50%);
  background:rgba(0,255,136,0.1); border:1px solid var(--neon);
  color:var(--neon); font-family:var(--font-hud); font-size:9px;
  letter-spacing:1px; padding:8px 20px; border-radius:2px; z-index:500;
  display:none; text-shadow:0 0 8px var(--neon);
  box-shadow:0 0 20px rgba(0,255,136,0.2);
}

/* ── DRAG GHOST ── */
#ghost {
  position:fixed; pointer-events:none; z-index:400;
  border:2px solid var(--neon); background:rgba(0,255,136,0.08);
  font-family:var(--font-hud); font-size:8px; color:var(--neon);
  padding:5px 10px; border-radius:2px; display:none; letter-spacing:1px;
  text-shadow:0 0 6px var(--neon); box-shadow:0 0 12px rgba(0,255,136,0.3);
}

/* ── ADD MODAL ── */
#modal {
  display:none; position:fixed; inset:0; z-index:700;
  background:rgba(0,5,0,0.85); backdrop-filter:blur(6px);
  align-items:center; justify-content:center;
}
#modal.show { display:flex; }
.mbox {
  background:rgba(4,8,4,0.99); border:1px solid var(--neon);
  box-shadow:0 0 40px rgba(0,255,136,0.2), inset 0 0 40px rgba(0,255,136,0.02);
  padding:28px 32px; min-width:320px;
}
.mbox h3 { font-family:var(--font-hud); font-size:9px; font-weight:700; color:var(--neon); margin-bottom:22px; letter-spacing:2px; text-shadow:0 0 10px var(--neon); }
.mbox label { font-family:var(--font-hud); font-size:8px; color:#3a5a3a; display:block; margin-bottom:3px; letter-spacing:1px; }
.mbox input { width:100%; background:rgba(0,0,0,0.6); border:1px solid var(--border); color:var(--neon); font-family:var(--font-mono); font-size:12px; padding:8px 10px; border-radius:2px; margin-bottom:14px; outline:none; }
.mbox input:focus { border-color:var(--neon); box-shadow:0 0 8px rgba(0,255,136,0.25); }
.mrow { display:flex; gap:14px; }
.mrow > div { flex:1; }
.macts { display:flex; gap:10px; margin-top:4px; }
.macts button { flex:1; padding:10px; font-family:var(--font-hud); font-size:8px; font-weight:700; letter-spacing:1px; cursor:pointer; border-radius:2px; }
.bcreate { background:rgba(0,255,136,0.12); border:1px solid var(--neon); color:var(--neon); }
.bcreate:hover { background:rgba(0,255,136,0.28); box-shadow:0 0 12px rgba(0,255,136,0.3); }
.bcancel { background:transparent; border:1px solid #1a2a1a; color:#3a4a3a; }
.bcancel:hover { border-color:#3a4a3a; color:#6a8a6a; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">IO<span>T</span> GALLERY</div>
  <div class="vsep"></div>
  <button class="btn" onclick="openModal()">＋ SCREEN</button>
  <button class="btn active" id="bpanel" onclick="togglePanel()">◧ LIST</button>
  <button class="btn" onclick="rotCam()">↻ ROTATE CAM</button>
  <div class="spacer"></div>
  <span style="font-family:var(--font-hud);font-size:8px;color:#3a5a3a;letter-spacing:1px;">NEON</span>
  <input type="color" id="color-pick" value="#00ff88" oninput="setNeon(this.value)">
  <button class="btn warn" id="bdel" style="display:none" onclick="delSel()">✕ DELETE</button>
</div>

<div id="wrap"><canvas id="c"></canvas></div>
<div id="camind">VIEW: <b id="clbl">FRONT</b></div>

<div id="rpanel">
  <div class="ptitle">SCREENS</div>
  <div id="slist"></div>
  <div id="detpanel" style="display:none">
    <label>CONTENT URL</label>
    <input type="text" id="durl" placeholder="https://... or drop a file" oninput="setUrl(this.value)">
    <label>WIDTH: <span id="lww">1.2</span>m</label>
    <input type="range" id="dw" min="0.3" max="4" step="0.1" value="1.2" oninput="resz('w',this.value)">
    <label>HEIGHT: <span id="lhh">0.7</span>m</label>
    <input type="range" id="dh" min="0.2" max="2.2" step="0.1" value="0.7" oninput="resz('h',this.value)">
  </div>
</div>

<div id="ghost">DROP FILE HERE</div>
<div id="toast"></div>

<div id="modal">
  <div class="mbox">
    <h3>ADD NEW SCREEN</h3>
    <label>NAME</label>
    <input type="text" id="mn" placeholder="MainScreen" maxlength="24">
    <div class="mrow">
      <div><label>WIDTH (m)</label><input type="number" id="mw" value="1.2" min="0.3" max="4" step="0.1"></div>
      <div><label>HEIGHT (m)</label><input type="number" id="mh" value="0.7" min="0.2" max="2.2" step="0.1"></div>
    </div>
    <div class="mrow">
      <div><label>WALL</label>
        <select id="mwall" style="width:100%;background:#000;border:1px solid rgba(0,255,136,0.2);color:#00ff88;font-family:monospace;font-size:12px;padding:8px;border-radius:2px;margin-bottom:14px;outline:none;">
          <option value="left">LEFT WALL</option>
          <option value="right">RIGHT WALL</option>
          <option value="back">BACK WALL (ceiling)</option>
          <option value="front">FRONT (entrance)</option>
        </select>
      </div>
    </div>
    <div class="macts">
      <button class="bcancel" onclick="closeModal()">CANCEL</button>
      <button class="bcreate" onclick="createFromModal()">CREATE</button>
    </div>
  </div>
</div>

<div id="terminal">
  <div id="tlog"></div>
  <div id="tinrow">
    <span id="tprompt">❯</span>
    <input id="tin" type="text" autocomplete="off" spellcheck="false"
      placeholder="/add Name 1.2 0.7 left  |  /set Name url  |  /help">
    <button id="texec" onclick="exec()">RUN</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  IOT GALLERY TWIN — Corrugated metal tunnel room
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── STATE ──────────────────────────────────────────────
let S = {
  screens: {},
  neon: '#00ff88',
  cam: 0,          // 0=normal, 1=flipped (2 cam views for tunnel)
  sel: null,
  nid: 1,
};

const CAM_NAMES = ['FRONT→BACK', 'BACK→FRONT'];

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('iot_twin_v4')||'{}');
    if(d.screens) S.screens = d.screens;
    if(d.neon) S.neon = d.neon;
    if(d.cam) S.cam = d.cam;
    if(d.nid) S.nid = d.nid;
    Object.values(S.screens).forEach(sc => loadMedia(sc));
  } catch(e){}
}

function save() {
  const d = { neon:S.neon, cam:S.cam, nid:S.nid, screens:{} };
  Object.values(S.screens).forEach(sc => {
    d.screens[sc.id] = {id:sc.id,name:sc.name,wall:sc.wall,tx:sc.tx,ty:sc.ty,w:sc.w,h:sc.h,url:sc.url||''};
  });
  localStorage.setItem('iot_twin_v4', JSON.stringify(d));
}

// ── TUNNEL GEOMETRY ─────────────────────────────────────
// The room is a long corrugated-metal tunnel
// We render a perspective view looking down the tunnel
// Walls: left, right (corrugated sides), ceiling (arched), floor (tiles)
// "back" = far end of tunnel, "front" = entrance end

let VP = {}; // viewport params computed on resize

function computeVP() {
  const W = canvas.width, H = canvas.height;
  VP.W = W; VP.H = H;
  VP.cx = W * 0.5;
  VP.cy = H * 0.42;
  VP.fov = H * 0.72; // perspective strength
  // Tunnel extends from z=0 (camera) to z=1 (far end)
  VP.near = 0.18;
  VP.far = 1.0;
  // Tunnel half-width and half-height at far end (perspective)
  VP.tW = W * 0.38;  // half-width at screen
  VP.tH = H * 0.36; // half-height at screen
}

// Project 3D tunnel coords to 2D screen
// x: -1(left) to +1(right), y: -1(floor) to +1(ceiling), z: 0(near) to 1(far)
function proj(x, y, z) {
  // Apply cam flip
  let rx = S.cam === 0 ? x : -x;
  let rz = S.cam === 0 ? z : (1-z);

  const scale = VP.fov / (VP.fov + rz * VP.fov * 2.8);
  return {
    sx: VP.cx + rx * VP.tW * scale,
    sy: VP.cy - y * VP.tH * scale,
    scale
  };
}

// ── CORRUGATED METAL TEXTURE ───────────────────────────
let corrTex = null;
function buildCorrTex() {
  const c = document.createElement('canvas');
  c.width = 4; c.height = 80;
  const g = c.getContext('2d');
  for(let y=0; y<80; y++) {
    const v = 18 + Math.sin(y*0.22)*9 + Math.sin(y*0.08)*4;
    g.fillStyle = `rgb(${v},${Math.round(v*1.05)},${v})`;
    g.fillRect(0,y,4,1);
  }
  corrTex = ctx.createPattern(c, 'repeat');
}

// ── FLOOR TILE TEXTURE ─────────────────────────────────
let tileTex = null;
function buildTileTex() {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const g = c.getContext('2d');
  g.fillStyle = '#1c1c1c';
  g.fillRect(0,0,64,64);
  g.fillStyle = '#242424';
  g.fillRect(1,1,62,62);
  g.strokeStyle = '#111';
  g.lineWidth = 1;
  g.strokeRect(0.5,0.5,63,63);
  tileTex = ctx.createPattern(c, 'repeat');
}

// ── DRAW FLOOR ─────────────────────────────────────────
function drawFloor() {
  const steps = 20;
  // Draw tile strips back to front
  for(let i=0; i<steps; i++) {
    const z0 = i/steps, z1 = (i+1)/steps;
    const p = [
      proj(-1,-1,z0), proj(1,-1,z0),
      proj(1,-1,z1), proj(-1,-1,z1)
    ];
    const brightness = 0.3 + z0*0.5;
    ctx.beginPath();
    ctx.moveTo(p[0].sx,p[0].sy);
    p.forEach(pt=>ctx.lineTo(pt.sx,pt.sy));
    ctx.closePath();

    // Tile gradient
    const gy = ctx.createLinearGradient(p[0].sx,p[0].sy, p[3].sx,p[3].sy);
    gy.addColorStop(0, `rgba(28,28,28,${brightness})`);
    gy.addColorStop(1, `rgba(36,36,36,${brightness})`);
    ctx.fillStyle = gy;
    ctx.fill();

    // Tile grid lines
    if(i%2===0) {
      ctx.strokeStyle = `rgba(50,50,50,${brightness*0.6})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  // LED strip glow at base of walls
  const nc = hexRgb(S.neon);
  for(let zi=0; zi<steps; zi++) {
    const z = zi/steps;
    const pb = proj(-1,-0.98,z), pe = proj(-1,-0.98,(zi+1)/steps);
    ctx.beginPath();
    ctx.moveTo(pb.sx,pb.sy); ctx.lineTo(pe.sx,pe.sy);
    ctx.strokeStyle = `rgba(${nc},${0.4*(1-z*0.5)})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    const pb2 = proj(1,-0.98,z), pe2 = proj(1,-0.98,(zi+1)/steps);
    ctx.beginPath();
    ctx.moveTo(pb2.sx,pb2.sy); ctx.lineTo(pe2.sx,pe2.sy);
    ctx.strokeStyle = `rgba(${nc},${0.4*(1-z*0.5)})`;
    ctx.stroke();
  }
}

// ── DRAW ARCH CEILING ──────────────────────────────────
function drawCeiling() {
  // Arch shape — draw strips along Z with arch cross-section
  const steps = 20, archPts = 24;
  const nc = hexRgb(S.neon);
  const nc2 = hexRgb(S.neon2||'#ffe000');

  for(let zi=0; zi<steps; zi++) {
    const z0 = zi/steps, z1=(zi+1)/steps;
    const zm = (z0+z1)/2;

    // Draw arch cross-section strip
    for(let ai=0; ai<archPts-1; ai++) {
      const a0 = Math.PI*(ai/archPts), a1 = Math.PI*((ai+1)/archPts);
      // arch: x from -1 to 1, y from 0 (sides) to 1 (top)
      const ax0 = Math.cos(Math.PI - a0), ay0 = Math.sin(a0) * 0.85 + 0.15;
      const ax1 = Math.cos(Math.PI - a1), ay1 = Math.sin(a1) * 0.85 + 0.15;

      const p00 = proj(ax0, ay0, z0);
      const p10 = proj(ax1, ay1, z0);
      const p11 = proj(ax1, ay1, z1);
      const p01 = proj(ax0, ay0, z1);

      const shade = 20 + Math.sin(a0)*8 + zi*0.3;
      const alpha = 0.9;
      ctx.beginPath();
      ctx.moveTo(p00.sx,p00.sy); ctx.lineTo(p10.sx,p10.sy);
      ctx.lineTo(p11.sx,p11.sy); ctx.lineTo(p01.sx,p01.sy);
      ctx.closePath();
      ctx.fillStyle = `rgba(${shade},${Math.round(shade*1.05)},${shade},${alpha})`;
      ctx.fill();

      // Corrugation lines
      if(ai%3===0) {
        ctx.beginPath();
        ctx.moveTo(p00.sx,p00.sy); ctx.lineTo(p01.sx,p01.sy);
        ctx.strokeStyle = `rgba(60,65,60,0.6)`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  // Neon LED strip along top of arch (center spine)
  for(let zi=0; zi<steps; zi++) {
    const z0=zi/steps, z1=(zi+1)/steps;
    const p0 = proj(0,1.0,z0), p1 = proj(0,1.0,z1);
    const alpha = 0.8 - zi*0.01;
    ctx.beginPath(); ctx.moveTo(p0.sx,p0.sy); ctx.lineTo(p1.sx,p1.sy);
    // Alternating yellow and neon strip (like the real gallery)
    const isYellow = Math.sin(zi*0.3) > 0;
    const stripCol = isYellow ? `rgba(${nc2},${alpha})` : `rgba(${nc},${alpha*0.6})`;
    ctx.strokeStyle = stripCol;
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 6; ctx.shadowColor = isYellow ? S.neon2||'#ffe000' : S.neon;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ── DRAW SIDE WALLS ────────────────────────────────────
function drawWall(side) {
  // side: 'left'(-1) or 'right'(+1)
  const x = side==='left' ? -1 : 1;
  const steps = 20;
  const {trans, solid} = wallViz();
  const isTranslucent = trans.includes(side);

  for(let zi=0; zi<steps; zi++) {
    const z0=zi/steps, z1=(zi+1)/steps;
    // Wall goes from floor (-1) to where arch begins (~0.15 up the side)
    // Actually full wall height from y=-1 to y=0.15 then arch takes over
    const p = [
      proj(x,-1,z0), proj(x,0.15,z0),
      proj(x,0.15,z1), proj(x,-1,z1)
    ];

    ctx.beginPath();
    ctx.moveTo(p[0].sx,p[0].sy);
    p.forEach(pt=>ctx.lineTo(pt.sx,pt.sy));
    ctx.closePath();

    if(isTranslucent) {
      ctx.fillStyle = 'rgba(100,200,150,0.03)';
      ctx.fill();
      // Pulse outline
      const pulse = 0.3 + 0.15*Math.sin(Date.now()/700+zi*0.2);
      ctx.strokeStyle = `rgba(0,255,136,${pulse*0.4})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    } else {
      // Corrugated metal appearance
      const shade = 16 + zi*0.4;
      ctx.fillStyle = `rgb(${shade},${Math.round(shade*1.03)},${shade})`;
      ctx.fill();
      // Corrugation horizontal lines
      if(zi%2===0) {
        ctx.strokeStyle = 'rgba(40,45,40,0.8)';
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }
    }
  }

  // SHELVING on wall (dark black panels with product items)
  if(!isTranslucent) drawShelf(side);

  // Translucent wall hint
  if(isTranslucent) {
    const zMid = 0.5;
    const pm = proj(x, -0.3, zMid);
    ctx.save();
    const pulse = 0.5 + 0.2*Math.sin(Date.now()/600);
    ctx.globalAlpha = pulse;
    ctx.font = `bold 11px Orbitron, monospace`;
    ctx.fillStyle = S.neon;
    ctx.textAlign = 'center';
    ctx.shadowBlur = 8; ctx.shadowColor = S.neon;
    ctx.fillText('↻ CLICK TO ROTATE VIEW', pm.sx, pm.sy);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ── DRAW SHELVING ──────────────────────────────────────
function drawShelf(side) {
  const x = side==='left' ? -1 : 1;
  // 3 shelf levels
  const shelves = [-0.55, -0.1, 0.32];
  shelves.forEach((sy, si) => {
    const steps = 12;
    for(let zi=0;zi<steps;zi++) {
      const z0=zi/steps, z1=(zi+1)/steps;
      const p = [
        proj(x*0.98, sy,     z0), proj(x*0.75, sy,     z0),
        proj(x*0.75, sy,     z1), proj(x*0.98, sy,     z1),
      ];
      ctx.beginPath();
      ctx.moveTo(p[0].sx,p[0].sy); p.forEach(pt=>ctx.lineTo(pt.sx,pt.sy));
      ctx.closePath();
      ctx.fillStyle = '#1a1a22';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
    // LED strip under shelf
    const nc = hexRgb(S.neon);
    for(let zi=0;zi<12;zi++) {
      const z0=zi/12, z1=(zi+1)/12;
      const pa = proj(x*0.98, sy-0.005, z0), pb = proj(x*0.98, sy-0.005, z1);
      ctx.beginPath(); ctx.moveTo(pa.sx,pa.sy); ctx.lineTo(pb.sx,pb.sy);
      // alternate colors like real gallery
      const colors = ['rgba(0,255,136,0.5)','rgba(255,0,200,0.5)','rgba(0,100,255,0.5)','rgba(255,200,0,0.5)'];
      ctx.strokeStyle = colors[(si*4+zi)%colors.length];
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Pixel items on shelf (colored squares representing products)
    for(let zi=1;zi<11;zi++) {
      const z = zi/12 + 0.04;
      const pt = proj(x*0.86, sy+0.06, z);
      const sz = pt.scale * 10;
      if(sz < 2) continue;
      const cols = ['#e8e8e8','#ff4444','#4444ff','#44ff44','#ffaa00','#ffffff','#aaaaff'];
      const col = cols[(si*7+zi*3)%cols.length];
      ctx.fillStyle = col;
      ctx.fillRect(pt.sx-sz/2, pt.sy-sz*0.7, sz*0.8, sz*1.2);
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(pt.sx-sz/2+1, pt.sy+sz*0.5, sz*0.8, sz*0.15);
    }
  });

  // Black display panel (like the real gallery walls)
  const panelZones = [[0.1,0.5],[0.55,0.9]];
  panelZones.forEach(([z0,z1]) => {
    const pts = [
      proj(x*0.98,-0.9,z0), proj(x*0.72,-0.9,z0),
      proj(x*0.72, 0.1,z0), proj(x*0.98, 0.1,z0),
      proj(x*0.98, 0.1,z1), proj(x*0.72, 0.1,z1),
      proj(x*0.72,-0.9,z1), proj(x*0.98,-0.9,z1),
    ];
    // Draw front face
    ctx.beginPath();
    ctx.moveTo(pts[0].sx,pts[0].sy);
    ctx.lineTo(pts[1].sx,pts[1].sy);
    ctx.lineTo(pts[2].sx,pts[2].sy);
    ctx.lineTo(pts[3].sx,pts[3].sy);
    ctx.closePath();
    ctx.fillStyle = 'rgba(10,10,18,0.9)';
    ctx.fill();
  });
}

// ── DRAW BACK WALL (far end) ───────────────────────────
function drawBackWall() {
  const {trans} = wallViz();
  const isTrans = trans.includes('back');

  // Draw rectangular back wall
  const corners = [
    proj(-1,-1,0.99), proj(1,-1,0.99),
    proj(1,1,0.99),   proj(-1,1,0.99)
  ];
  ctx.beginPath();
  corners.forEach((p,i)=>i?ctx.lineTo(p.sx,p.sy):ctx.moveTo(p.sx,p.sy));
  ctx.closePath();

  if(isTrans) {
    ctx.fillStyle = 'rgba(0,50,20,0.05)';
    ctx.fill();
    const pulse = 0.3+0.15*Math.sin(Date.now()/700);
    ctx.strokeStyle = `rgba(0,255,136,${pulse*0.4})`;
    ctx.lineWidth=1.5; ctx.stroke();
  } else {
    // IOT Gallery entrance door
    ctx.fillStyle = '#0e0e0e';
    ctx.fill();
    // Door frame
    const dl = proj(-0.25,-1,0.985), dr = proj(0.25,-1,0.985);
    const dt = proj(-0.25,-0.2,0.985), dtr = proj(0.25,-0.2,0.985);
    ctx.beginPath();
    ctx.moveTo(dl.sx,dl.sy); ctx.lineTo(dr.sx,dr.sy);
    ctx.lineTo(dtr.sx,dtr.sy); ctx.lineTo(dt.sx,dt.sy);
    ctx.closePath();
    ctx.fillStyle = '#1a1a1a';
    ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth=1.5; ctx.stroke();

    // IOT logo on door
    const logo = proj(0,-0.5,0.985);
    ctx.font = `bold ${Math.round(logo.scale*18)}px Orbitron,monospace`;
    ctx.fillStyle = S.neon;
    ctx.textAlign = 'center';
    ctx.shadowBlur = 10; ctx.shadowColor = S.neon;
    ctx.fillText('IOT', logo.sx, logo.sy);
    ctx.font = `${Math.round(logo.scale*9)}px Orbitron,monospace`;
    ctx.fillText('GALLERY', logo.sx, logo.sy + logo.scale*14);
    ctx.shadowBlur=0;

    // www.iot.gallery text above door
    const url = proj(0,0.1,0.985);
    ctx.font = `${Math.round(url.scale*7)}px Share Tech Mono,monospace`;
    ctx.fillStyle = '#445544';
    ctx.fillText('WWW.IOT.GALLERY', url.sx, url.sy);
  }
}

// ── DRAW FRONT (entrance area, behind camera) ──────────
// Not drawn in perspective — just vignette/edge

// ── DRAW SCREENS ───────────────────────────────────────
function drawScreens() {
  const {solid} = wallViz();
  Object.values(S.screens).forEach(sc => {
    const vis = solid.includes(sc.wall) || sc.wall==='back';
    drawScreen(sc, vis);
  });
}

function screenPts(sc) {
  // sc.tx, sc.ty: position on wall (normalized)
  // tx: -0.8..0.8 along z axis, ty: -0.7..0.7 height
  const sw = sc.w * 0.25, sh = sc.h * 0.28;
  const t = sc.tx, y = sc.ty;

  switch(sc.wall) {
    case 'left':
      return [
        proj(-0.98, y+sh, t-sw), proj(-0.98, y+sh, t+sw),
        proj(-0.98, y-sh, t+sw), proj(-0.98, y-sh, t-sw)
      ];
    case 'right':
      return [
        proj(0.98, y+sh, t+sw), proj(0.98, y+sh, t-sw),
        proj(0.98, y-sh, t-sw), proj(0.98, y-sh, t+sw)
      ];
    case 'back':
      return [
        proj(t-sw, y+sh, 0.97), proj(t+sw, y+sh, 0.97),
        proj(t+sw, y-sh, 0.97), proj(t-sw, y-sh, 0.97)
      ];
    case 'front':
      return [
        proj(t+sw, y+sh, 0.03), proj(t-sw, y+sh, 0.03),
        proj(t-sw, y-sh, 0.03), proj(t+sw, y-sh, 0.03)
      ];
    default: return null;
  }
}

function drawScreen(sc, visible) {
  const pts = screenPts(sc);
  if(!pts) return;

  const isSel = sc.id===S.sel;
  const alpha = visible ? 1 : 0.2;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Frame
  const fc = isSel ? S.neon : '#2a3a2a';
  ctx.shadowBlur = isSel ? 14 : 0;
  ctx.shadowColor = S.neon;

  // Screen face
  ctx.beginPath();
  pts.forEach((p,i)=>i?ctx.lineTo(p.sx,p.sy):ctx.moveTo(p.sx,p.sy));
  ctx.closePath();

  if(sc.img) {
    ctx.save(); ctx.clip();
    const xs=pts.map(p=>p.sx), ys=pts.map(p=>p.sy);
    ctx.drawImage(sc.img, Math.min(...xs), Math.min(...ys), Math.max(...xs)-Math.min(...xs), Math.max(...ys)-Math.min(...ys));
    ctx.restore();
  } else if(sc.vid) {
    ctx.save(); ctx.clip();
    const xs=pts.map(p=>p.sx), ys=pts.map(p=>p.sy);
    ctx.drawImage(sc.vid, Math.min(...xs), Math.min(...ys), Math.max(...xs)-Math.min(...xs), Math.max(...ys)-Math.min(...ys));
    ctx.restore();
  } else {
    // Empty screen — dark with scanlines + glow
    ctx.fillStyle = '#030a03';
    ctx.fill();
    const xs=pts.map(p=>p.sx), ys=pts.map(p=>p.sy);
    const bx=Math.min(...xs), by=Math.min(...ys), bh=Math.max(...ys)-by, bw=Math.max(...xs)-bx;
    for(let ly=by; ly<by+bh; ly+=3) {
      ctx.fillStyle='rgba(0,255,136,0.025)';
      ctx.fillRect(bx,ly,bw,1);
    }
    // Center pulse
    const cx=(xs[0]+xs[1]+xs[2]+xs[3])/4, cy=(ys[0]+ys[1]+ys[2]+ys[3])/4;
    const pulse=0.3+0.2*Math.sin(Date.now()/900+sc.id.charCodeAt(3)||0);
    const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,bw*0.4);
    rg.addColorStop(0,`rgba(0,255,136,${pulse*0.25})`);
    rg.addColorStop(1,'transparent');
    ctx.beginPath();
    pts.forEach((p,i)=>i?ctx.lineTo(p.sx,p.sy):ctx.moveTo(p.sx,p.sy));
    ctx.closePath();
    ctx.fillStyle=rg; ctx.fill();
  }

  // Outline
  ctx.beginPath();
  pts.forEach((p,i)=>i?ctx.lineTo(p.sx,p.sy):ctx.moveTo(p.sx,p.sy));
  ctx.closePath();
  ctx.strokeStyle = fc;
  ctx.lineWidth = isSel ? 2 : 1;
  ctx.stroke();

  // Corner dots
  pts.forEach(p=>{
    ctx.fillStyle = isSel?S.neon:'#334433';
    ctx.fillRect(p.sx-2,p.sy-2,4,4);
  });

  // Label
  const top = pts[0];
  ctx.font=`bold 8px Orbitron,monospace`;
  ctx.fillStyle = isSel?S.neon:'#3a5a3a';
  ctx.textAlign='left';
  ctx.shadowBlur = isSel?6:0;
  ctx.fillText(sc.name, top.sx+3, top.sy-3);
  ctx.shadowBlur=0;

  ctx.restore();
}

// ── DRAW PROJECTORS / SPOTLIGHTS ───────────────────────
function drawSpots() {
  const nc = hexRgb(S.neon);
  const spotPositions = [0.2, 0.45, 0.7];
  spotPositions.forEach((z, i) => {
    [-0.4, 0, 0.4].forEach(x => {
      const p = proj(x, 0.92, z);
      // Spot body
      ctx.fillStyle='#222';
      ctx.fillRect(p.sx-p.scale*4, p.sy-p.scale*4, p.scale*8, p.scale*6);
      // Light cone (subtle)
      const target = proj(x*0.5, -0.5, z+0.05);
      const cg = ctx.createLinearGradient(p.sx,p.sy, target.sx,target.sy);
      cg.addColorStop(0, `rgba(${nc},0.08)`);
      cg.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.moveTo(p.sx-2,p.sy); ctx.lineTo(p.sx+2,p.sy);
      ctx.lineTo(target.sx+8,target.sy); ctx.lineTo(target.sx-8,target.sy);
      ctx.closePath();
      ctx.fillStyle=cg; ctx.fill();
    });
  });
}

// ── VIGNETTE ───────────────────────────────────────────
function drawVignette() {
  const W=VP.W,H=VP.H;
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.3, W/2,H/2,H*0.75);
  vg.addColorStop(0,'transparent');
  vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

// ── WALL VISIBILITY ────────────────────────────────────
// Solid: left, right (always visible from center)
// Translucent: back or front depending on cam
function wallViz() {
  if(S.cam===0) return { solid:['left','right','back'], trans:['front'] };
  return { solid:['left','right','front'], trans:['back'] };
}

// ── MAIN RENDER ────────────────────────────────────────
function render() {
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#050805');
  bg.addColorStop(1,'#020302');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  computeVP();

  // Draw back to front
  drawBackWall();
  drawCeiling();
  drawWall('left');
  drawWall('right');
  drawFloor();
  drawSpots();
  drawScreens();
  drawVignette();

  requestAnimationFrame(render);
}

// ── INTERACTION ────────────────────────────────────────
let drag = null;

function screenHit(mx,my) {
  for(const sc of Object.values(S.screens)) {
    const pts=screenPts(sc);
    if(pts && inPoly(mx,my,pts)) return sc;
  }
  return null;
}

function wallHit(mx,my) {
  const {trans} = wallViz();
  for(const w of trans) {
    let pts;
    if(w==='left')  pts=[proj(-1,-1,0),proj(-1,-1,1),proj(-1,1,1),proj(-1,1,0)];
    if(w==='right') pts=[proj(1,-1,0),proj(1,-1,1),proj(1,1,1),proj(1,1,0)];
    if(w==='back')  pts=[proj(-1,-1,0.99),proj(1,-1,0.99),proj(1,1,0.99),proj(-1,1,0.99)];
    if(w==='front') pts=[proj(-1,-1,0.01),proj(1,-1,0.01),proj(1,1,0.01),proj(-1,1,0.01)];
    if(pts && inPoly(mx,my,pts)) return w;
  }
  return null;
}

function inPoly(px,py,pts) {
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].sx,yi=pts[i].sy,xj=pts[j].sx,yj=pts[j].sy;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

// Mouse to wall position (inverse projection, approximate)
function mouseToWall(mx,my,wall) {
  let best={tx:0,ty:0,d:Infinity};
  const steps=30;
  for(let xi=0;xi<=steps;xi++){
    for(let yi=0;yi<=steps;yi++){
      const tx=-0.9+1.8*xi/steps;
      const ty=-0.75+1.3*yi/steps;
      let p;
      if(wall==='left')  p=proj(-0.98,ty,tx);
      if(wall==='right') p=proj(0.98,ty,tx);
      if(wall==='back')  p=proj(tx,ty,0.97);
      if(wall==='front') p=proj(tx,ty,0.03);
      if(!p) continue;
      const d=(p.sx-mx)**2+(p.sy-my)**2;
      if(d<best.d){best={tx,ty,d};}
    }
  }
  return {tx:best.tx,ty:best.ty};
}

canvas.addEventListener('mousedown', e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(canvas.width/r.width);
  const my=(e.clientY-r.top)*(canvas.height/r.height);
  const sc=screenHit(mx,my);
  if(sc){
    sel(sc.id);
    drag={id:sc.id,mx,my};
    canvas.style.cursor='grabbing';
    return;
  }
  const w=wallHit(mx,my);
  if(w){ rotCam(); return; }
  sel(null);
});

canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(canvas.width/r.width);
  const my=(e.clientY-r.top)*(canvas.height/r.height);

  if(drag){
    const sc=S.screens[drag.id];
    if(sc){
      const pos=mouseToWall(mx,my,sc.wall);
      sc.tx=Math.max(-0.88,Math.min(0.88,pos.tx));
      sc.ty=Math.max(-0.75,Math.min(0.65,pos.ty));
    }
    return;
  }
  const sc2=screenHit(mx,my);
  const w2=wallHit(mx,my);
  canvas.style.cursor=sc2?'grab':w2?'pointer':'default';
});

canvas.addEventListener('mouseup', ()=>{
  if(drag){ save(); drag=null; canvas.style.cursor='default'; }
});

// Drop files onto canvas
canvas.addEventListener('dragover',e=>{
  e.preventDefault();
  document.getElementById('ghost').style.display='block';
  document.getElementById('ghost').style.left=(e.clientX+14)+'px';
  document.getElementById('ghost').style.top=(e.clientY+14)+'px';
});
canvas.addEventListener('dragleave',()=>{document.getElementById('ghost').style.display='none';});
canvas.addEventListener('drop',e=>{
  e.preventDefault();
  document.getElementById('ghost').style.display='none';
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(canvas.width/r.width);
  const my=(e.clientY-r.top)*(canvas.height/r.height);
  const sc=screenHit(mx,my)||(S.sel?S.screens[S.sel]:null);
  const files=e.dataTransfer.files;
  const url=e.dataTransfer.getData('text/uri-list')||e.dataTransfer.getData('text/plain');
  if(files&&files.length>0&&sc) { loadFile(sc,files[0]); }
  else if(url&&sc) { sc.url=url; loadMedia(sc); save(); }
  else toast('Drop onto a screen!', true);
});

// ── MEDIA LOADING ──────────────────────────────────────
function loadFile(sc,file){
  const url=URL.createObjectURL(file);
  if(file.type.startsWith('video/')){
    const v=document.createElement('video');
    v.src=url; v.loop=true; v.muted=true; v.play().catch(()=>{});
    sc.vid=v; sc.img=null; sc.url=file.name;
    toast(`✔ VIDEO → "${sc.name}"`);
  } else {
    const img=new Image();
    img.onload=()=>{sc.img=img; toast(`✔ IMAGE → "${sc.name}"`);}
    img.src=url;
    sc.img=img; sc.vid=null; sc.url=file.name;
  }
  save();
}

function loadMedia(sc){
  if(!sc.url) return;
  const url=sc.url;
  if(url.match(/\.(mp4|webm|ogg)$/i)){
    const v=document.createElement('video');
    v.src=url; v.loop=true; v.muted=true; v.play().catch(()=>{});
    sc.vid=v; sc.img=null;
  } else if(url.startsWith('http')||url.match(/\.(jpg|jpeg|png|gif|webp|svg)$/i)){
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>sc.img=img;
    img.src=url; sc.img=img; sc.vid=null;
  }
}

// ── SCREEN MANAGEMENT ──────────────────────────────────
function addScreen(name,w,h,wall){
  if(!name.trim()) return {error:'Screen needs a name'};
  if(Object.values(S.screens).find(s=>s.name===name)) return {error:`"${name}" already exists`};
  const id='sc_'+(S.nid++);
  S.screens[id]={id,name,w:parseFloat(w)||1.2,h:parseFloat(h)||0.7,wall:wall||'left',tx:0,ty:-0.1,url:'',img:null,vid:null};
  sel(id); save();
  return {msg:`Screen "${name}" created on ${wall} wall`};
}

function sel(id){
  S.sel=id;
  document.getElementById('bdel').style.display=id?'inline-block':'none';
  refreshPanel();
}

function delSel(){
  if(!S.sel) return;
  const sc=S.screens[S.sel];
  if(!sc) return;
  const n=sc.name;
  delete S.screens[S.sel];
  sel(null); save();
  toast(`Deleted "${n}"`);
}

function rotCam(){
  S.cam=(S.cam+1)%2;
  document.getElementById('clbl').textContent=CAM_NAMES[S.cam];
  save(); toast('↻ '+CAM_NAMES[S.cam]);
}

function setNeon(c){
  S.neon=c;
  document.documentElement.style.setProperty('--neon',c);
  save();
}

function setUrl(url){
  const sc=S.screens[S.sel]; if(!sc) return;
  sc.url=url; loadMedia(sc); save();
}

function resz(axis,val){
  const sc=S.screens[S.sel]; if(!sc) return;
  if(axis==='w'){sc.w=parseFloat(val);document.getElementById('lww').textContent=parseFloat(val).toFixed(1);}
  if(axis==='h'){sc.h=parseFloat(val);document.getElementById('lhh').textContent=parseFloat(val).toFixed(1);}
  save();
}

// ── PANEL ──────────────────────────────────────────────
function refreshPanel(){
  const list=document.getElementById('slist');
  list.innerHTML='';
  Object.values(S.screens).forEach(sc=>{
    const d=document.createElement('div');
    d.className='sitem'+(sc.id===S.sel?' sel':'');
    d.innerHTML=`<div class="sname">${sc.name}</div><div class="sinfo">${sc.w}×${sc.h}m · ${sc.wall.toUpperCase()}</div>`;
    d.onclick=()=>sel(sc.id);
    list.appendChild(d);
  });
  const dp=document.getElementById('detpanel');
  const sc=S.sel?S.screens[S.sel]:null;
  if(sc){
    dp.style.display='block';
    document.getElementById('durl').value=sc.url||'';
    document.getElementById('dw').value=sc.w;
    document.getElementById('lww').textContent=sc.w.toFixed(1);
    document.getElementById('dh').value=sc.h;
    document.getElementById('lhh').textContent=sc.h.toFixed(1);
  } else dp.style.display='none';
}

function togglePanel(){
  document.getElementById('rpanel').classList.toggle('hide');
  document.getElementById('bpanel').classList.toggle('active');
}

// ── MODAL ──────────────────────────────────────────────
function openModal(){ document.getElementById('modal').classList.add('show'); setTimeout(()=>document.getElementById('mn').focus(),80); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function createFromModal(){
  const n=document.getElementById('mn').value.trim();
  const w=parseFloat(document.getElementById('mw').value);
  const h=parseFloat(document.getElementById('mh').value);
  const wall=document.getElementById('mwall').value;
  const r=addScreen(n,w,h,wall);
  if(r.error){toast(r.error,true);return;}
  toast(r.msg); refreshPanel();
  tlog('k','✔ '+r.msg);
  closeModal();
  document.getElementById('mn').value='';
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Delete'&&S.sel&&document.activeElement.tagName!=='INPUT') delSel();
});

// ── TERMINAL ───────────────────────────────────────────
let hist=[],hIdx=-1;
const tin=document.getElementById('tin');
tin.addEventListener('keydown',e=>{
  if(e.key==='Enter'){exec();}
  else if(e.key==='ArrowUp'){hIdx=Math.min(hIdx+1,hist.length-1);tin.value=hist[hIdx]||'';e.preventDefault();}
  else if(e.key==='ArrowDown'){hIdx=Math.max(hIdx-1,-1);tin.value=hIdx===-1?'':hist[hIdx];e.preventDefault();}
});

function exec(){
  const inp=tin.value.trim(); if(!inp) return;
  tlog('i','❯ '+inp); hist.unshift(inp); hIdx=-1; tin.value='';
  runCmd(inp);
}

function runCmd(inp){
  if(!inp.startsWith('/')){tlog('e','Commands start with /  — /help');return;}
  const p=inp.split(/\s+/), cmd=p[0].toLowerCase();
  switch(cmd){
    case '/add':{
      if(p.length<5){tlog('e','Usage: /add [name] [w] [h] [left|right|back|front]');return;}
      const r=addScreen(p[1],p[2],p[3],p[4]);
      if(r.error)tlog('e','✖ '+r.error); else{tlog('k','✔ '+r.msg);refreshPanel();}
      break;
    }
    case '/set':{
      if(p.length<3){tlog('e','Usage: /set [name] [url]');return;}
      const sc=Object.values(S.screens).find(s=>s.name===p[1]);
      if(!sc){tlog('e',`"${p[1]}" not found`);return;}
      sc.url=p.slice(2).join(' '); loadMedia(sc); save();
      tlog('k',`✔ Content → "${sc.name}"`);
      break;
    }
    case '/move':{
      if(p.length<3){tlog('e','Usage: /move [name] [left|right|back|front]');return;}
      const sc=Object.values(S.screens).find(s=>s.name===p[1]);
      if(!sc){tlog('e',`"${p[1]}" not found`);return;}
      if(!['left','right','back','front'].includes(p[2])){tlog('e','Wall: left right back front');return;}
      sc.wall=p[2]; save(); refreshPanel();
      tlog('k',`✔ "${sc.name}" → ${p[2]} wall`);
      break;
    }
    case '/delete':{
      if(p.length<2){tlog('e','Usage: /delete [name]');return;}
      const sc=Object.values(S.screens).find(s=>s.name===p[1]);
      if(!sc){tlog('e',`"${p[1]}" not found`);return;}
      if(S.sel===sc.id)sel(null);
      delete S.screens[sc.id]; save(); refreshPanel();
      tlog('k',`✔ Deleted "${p[1]}"`);
      break;
    }
    case '/light':{
      if(p.length<2){tlog('e','Usage: /light #hexcolor');return;}
      const c=p[1].startsWith('#')?p[1]:'#'+p[1];
      if(!/^#[0-9a-fA-F]{6}$/.test(c)){tlog('e','Invalid hex color');return;}
      setNeon(c); document.getElementById('color-pick').value=c;
      tlog('k',`✔ Neon → ${c}`);
      break;
    }
    case '/list':{
      const scs=Object.values(S.screens);
      if(!scs.length){tlog('o','(no screens — /add)');return;}
      scs.forEach(s=>tlog('o',`  ${s.name}  ${s.w}×${s.h}m  ${s.wall}`));
      break;
    }
    case '/rotate':{rotCam();tlog('k','✔ Camera → '+CAM_NAMES[S.cam]);break;}
    case '/help':{
`COMMANDS
────────────────────────────────────────
/add [name] [w] [h] [wall]  Create screen
/set [name] [url]           Assign content
/move [name] [wall]         Change wall
/delete [name]              Remove screen
/light [#hex]               Neon color
/list                       List screens
/rotate                     Flip camera
/help                       This help

MOUSE
──────────────────────────────────────
Drag screen     Reposition on wall
Click wall      Rotate camera view
Drop file→screen  Assign image/video`.split('\n').forEach(l=>tlog('h',l));
      break;
    }
    default: tlog('e',`Unknown: ${cmd}. Type /help`);
  }
}

function tlog(cls,txt){
  const log=document.getElementById('tlog');
  const d=document.createElement('div');
  d.className='tl '+cls; d.textContent=txt;
  log.appendChild(d);
  while(log.children.length>300) log.removeChild(log.firstChild);
  log.scrollTop=log.scrollHeight;
}

// ── TOAST ──────────────────────────────────────────────
let tTimer;
function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  t.style.borderColor=err?'#ff4444':S.neon;
  t.style.color=err?'#ff4444':S.neon;
  clearTimeout(tTimer); tTimer=setTimeout(()=>t.style.display='none',2500);
}

// ── HELPERS ────────────────────────────────────────────
function hexRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// S.neon2 for yellow strip
S.neon2='#ffe000';

// ── RESIZE ─────────────────────────────────────────────
function resize(){
  canvas.width=document.getElementById('wrap').offsetWidth;
  canvas.height=document.getElementById('wrap').offsetHeight;
}
window.addEventListener('resize',resize);

// ── PANEL REFRESH LOOP ─────────────────────────────────
setInterval(refreshPanel, 600);

// ── BOOT ───────────────────────────────────────────────
load();
resize();
buildCorrTex();
buildTileTex();

document.getElementById('clbl').textContent=CAM_NAMES[S.cam];
document.getElementById('color-pick').value=S.neon;
document.documentElement.style.setProperty('--neon',S.neon);

if(Object.keys(S.screens).length===0){
  addScreen('Nike_Wall',1.4,0.8,'right');
  S.screens[Object.keys(S.screens)[0]].tx=0.3;
  S.screens[Object.keys(S.screens)[0]].ty=-0.1;
  addScreen('Jordan_Screen',1.2,0.7,'left');
  S.screens[Object.keys(S.screens)[1]].tx=-0.2;
  S.screens[Object.keys(S.screens)[1]].ty=0.1;
  addScreen('IOT_Main',1.8,1.0,'back');
  S.screens[Object.keys(S.screens)[2]].tx=0;
  S.screens[Object.keys(S.screens)[2]].ty=0.2;
  save();
}

refreshPanel();
tlog('s','IOT GALLERY TWIN — Screen Manager v2.0');
tlog('s','Corrugated metal tunnel room loaded.');
tlog('s','Type /help for commands. Drag files onto screens.');
tlog('s','────────────────────────────────────────────────');

render();
</script>
</body>
